name: Lint & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app
      - name: Type-check (mypy, non-blocking)
        continue-on-error: true
        run: mypy app || true
      - name: Test
        run: pytest -x -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Build
        run: npm run build
      - name: Lint (placeholder)
        run: echo "Add eslint config to enable strict linting."

  docker:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
      - name: Start
        run: docker compose up -d
      - name: Wait for healthz
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz || true)
            if [ "$code" = "200" ]; then
              echo "OK"
              exit 0
            fi
            sleep 5
          done
          echo "Frontend never became healthy"
          docker compose logs
          exit 1
      - name: Stop
        if: always()
        run: docker compose down -v
