services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realtime-earth-backend
    restart: unless-stopped
    environment:
      - REALTIME_EARTH_LOG_LEVEL=${REALTIME_EARTH_LOG_LEVEL:-INFO}
      - REALTIME_EARTH_ENABLE_SATELLITES=${REALTIME_EARTH_ENABLE_SATELLITES:-true}
      - REALTIME_EARTH_ENABLE_LIGHTNING=${REALTIME_EARTH_ENABLE_LIGHTNING:-true}
      - REALTIME_EARTH_ENABLE_EARTHQUAKES=${REALTIME_EARTH_ENABLE_EARTHQUAKES:-true}
      - REALTIME_EARTH_ENABLE_WILDFIRES=${REALTIME_EARTH_ENABLE_WILDFIRES:-true}
      - REALTIME_EARTH_ENABLE_VOLCANOES=${REALTIME_EARTH_ENABLE_VOLCANOES:-true}
      - REALTIME_EARTH_ENABLE_SOLAR=${REALTIME_EARTH_ENABLE_SOLAR:-true}
      - REALTIME_EARTH_FIRMS_MAP_KEY=${REALTIME_EARTH_FIRMS_MAP_KEY:-}
      - REALTIME_EARTH_CORS_ORIGINS=${REALTIME_EARTH_CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
    volumes:
      - backend-cache:/app/.cache
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx, sys; r=httpx.get('http://localhost:8000/healthz'); sys.exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=/api
        - VITE_WS_BASE=/ws
    container_name: realtime-earth-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${REALTIME_EARTH_HTTP_PORT:-8080}:80"

volumes:
  backend-cache:
    description: Persistent cache for TLE data and other long-lived fetches
