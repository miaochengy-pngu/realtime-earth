server {
    listen 80;
    server_name _;

    # Allow large Cesium tiles & assets
    client_max_body_size 32M;

    # SPA — serve built index.html for any unknown route
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cesium static files (Workers, Assets, Widgets, ThirdParty)
    location ~* \.(wasm|js|css|png|jpg|svg|woff2?|glb|krtd)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy REST API to FastAPI
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthz (liveness check)
    location = /healthz {
        proxy_pass http://backend:8000;
    }

    # Proxy WebSocket to FastAPI
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/css application/json application/javascript text/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;
}
